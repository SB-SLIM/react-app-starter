name: E2E

on:
  workflow_dispatch: # temporarily disabled — re-enable by adding pull_request trigger

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium firefox

      - name: Start stack
        run: |
          cp .env.example .env
          docker compose -f infra/compose/docker-compose.yml up -d --wait postgres valkey mailhog
          pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas

      - name: Build apps
        run: pnpm turbo build --filter=admin... --filter=server...

      - name: Run Playwright tests
        run: pnpm --filter e2e test:e2e
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:3001

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
