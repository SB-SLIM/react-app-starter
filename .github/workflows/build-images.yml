name: Build & Push Images

on:
  # Trigger on push to main so dorny/paths-filter receives the native push
  # before/after SHAs and correctly detects all changed files across every
  # commit in the push (not just HEAD~1 as it would in workflow_run context).
  # CI is enforced via branch protection — merges are blocked until CI passes.
  push:
    branches: [main]

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      superadmin: ${{ steps.filter.outputs.superadmin }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared: &shared
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            server:
              - *shared
              - 'apps/server/**'
              - 'infra/docker/Dockerfile.server'
            web:
              - *shared
              - 'apps/web/**'
              - 'infra/docker/Dockerfile.web'
            admin:
              - *shared
              - 'apps/admin/**'
              - 'infra/docker/Dockerfile.admin'
            superadmin:
              - *shared
              - 'apps/superadmin/**'
              - 'infra/docker/Dockerfile.superadmin'
            worker:
              - *shared
              - 'infra/docker/Dockerfile.worker'

  build:
    name: Build ${{ matrix.app }}
    needs: changes
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: server
            dockerfile: infra/docker/Dockerfile.server
          - app: web
            dockerfile: infra/docker/Dockerfile.web
          - app: admin
            dockerfile: infra/docker/Dockerfile.admin
          - app: superadmin
            dockerfile: infra/docker/Dockerfile.superadmin
          - app: worker
            dockerfile: infra/docker/Dockerfile.worker

    # The `matrix` context is not allowed in a job-level `if`, so the
    # per-app skip is applied at the step level. The `changes` outputs are
    # named exactly like the apps, so we index them by `matrix.app`.
    env:
      BUILD_APP: ${{ needs.changes.outputs[matrix.app] }}

    steps:
      - if: ${{ env.BUILD_APP == 'true' }}
        uses: actions/checkout@v7

      - name: Log in to GHCR
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build args are only needed for the admin SPA (Vite bakes them in).
      # Set in GitHub repo settings: Settings → Variables → Actions.
      - name: Resolve build args
        id: args
        if: ${{ env.BUILD_APP == 'true' }}
        run: |
          if [ "${{ matrix.app }}" = "admin" ] || [ "${{ matrix.app }}" = "superadmin" ]; then
            {
              echo "value<<ARGS_EOF"
              echo "VITE_TRPC_URL=${{ vars.VITE_TRPC_URL }}"
              echo "VITE_BETTER_AUTH_URL=${{ vars.VITE_BETTER_AUTH_URL }}"
              echo "ARGS_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.args.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
