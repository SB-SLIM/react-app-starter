name: Build & Push Images

on:
  # Only build images after CI (lint/typecheck/test) passes.
  # Prevents pushing broken images and triggering a deploy from a failing commit.
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # Gate job: runs unconditionally and fails if CI didn't pass.
  # Without this, a workflow where all jobs are skipped still has
  # conclusion 'success', which would incorrectly trigger Deploy.
  gate:
    name: Check CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Fail if CI did not succeed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI workflow concluded with '${{ github.event.workflow_run.conclusion }}' — aborting build."
          exit 1

  changes:
    name: Detect changed apps
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      superadmin: ${{ steps.filter.outputs.superadmin }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared: &shared
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            server:
              - *shared
              - 'apps/server/**'
              - 'infra/docker/Dockerfile.server'
            web:
              - *shared
              - 'apps/web/**'
              - 'infra/docker/Dockerfile.web'
            admin:
              - *shared
              - 'apps/admin/**'
              - 'infra/docker/Dockerfile.admin'
            superadmin:
              - *shared
              - 'apps/superadmin/**'
              - 'infra/docker/Dockerfile.superadmin'
            worker:
              - *shared
              - 'infra/docker/Dockerfile.worker'

  build:
    name: Build ${{ matrix.app }}
    needs: [gate, changes]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: server
            dockerfile: infra/docker/Dockerfile.server
          - app: web
            dockerfile: infra/docker/Dockerfile.web
          - app: admin
            dockerfile: infra/docker/Dockerfile.admin
          - app: superadmin
            dockerfile: infra/docker/Dockerfile.superadmin
          - app: worker
            dockerfile: infra/docker/Dockerfile.worker

    # The `matrix` context is not allowed in a job-level `if`, so the
    # per-app skip is applied at the step level. The `changes` outputs are
    # named exactly like the apps, so we index them by `matrix.app`.
    env:
      BUILD_APP: ${{ needs.changes.outputs[matrix.app] }}

    steps:
      - if: ${{ env.BUILD_APP == 'true' }}
        uses: actions/checkout@v6

      - name: Log in to GHCR
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build args are only needed for the admin SPA (Vite bakes them in).
      # Set in GitHub repo settings: Settings → Variables → Actions.
      - name: Resolve build args
        id: args
        if: ${{ env.BUILD_APP == 'true' }}
        run: |
          if [ "${{ matrix.app }}" = "admin" ] || [ "${{ matrix.app }}" = "superadmin" ]; then
            {
              echo "value<<ARGS_EOF"
              echo "VITE_TRPC_URL=${{ vars.VITE_TRPC_URL }}"
              echo "VITE_BETTER_AUTH_URL=${{ vars.VITE_BETTER_AUTH_URL }}"
              echo "ARGS_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: ${{ env.BUILD_APP == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.args.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
