name: Build & Push Images

on:
  # Only build images after CI (lint/typecheck/test) passes.
  # Prevents pushing broken images and triggering a deploy from a failing commit.
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  build:
    name: Build ${{ matrix.app }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: server
            dockerfile: infra/docker/Dockerfile.server
          - app: admin
            dockerfile: infra/docker/Dockerfile.admin
          - app: worker
            dockerfile: infra/docker/Dockerfile.worker

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build args are only needed for the admin SPA (Vite bakes them in).
      # Set in GitHub repo settings: Settings → Variables → Actions.
      - name: Resolve build args
        id: args
        run: |
          if [ "${{ matrix.app }}" = "admin" ]; then
            echo "value=VITE_TRPC_URL=${{ vars.VITE_TRPC_URL }}" >> "$GITHUB_OUTPUT"
            echo "VITE_BETTER_AUTH_URL=${{ vars.VITE_BETTER_AUTH_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.args.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
